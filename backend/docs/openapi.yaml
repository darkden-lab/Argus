openapi: "3.0.3"
info:
  title: Argus API
  description: Multi-cluster Kubernetes admin dashboard with plugin system
  version: "1.0.0"
  contact:
    name: Argus Team

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Authentication (JWT, OIDC)
  - name: Users
    description: User management (admin)
  - name: Profile
    description: User profile and preferences
  - name: API Keys
    description: API key authentication
  - name: OIDC
    description: OIDC provider settings and mappings
  - name: RBAC
    description: Permissions, roles, and assignments
  - name: Clusters
    description: Multi-cluster management
  - name: Agent Tokens
    description: Cluster agent token management
  - name: Resources
    description: Generic Kubernetes resource CRUD
  - name: Projects
    description: Project aggregation by label
  - name: Plugins
    description: Plugin management
  - name: Istio
    description: Istio service mesh plugin
  - name: Prometheus
    description: Prometheus Operator plugin
  - name: Calico
    description: Calico networking plugin
  - name: CNPG
    description: CloudNativePG plugin
  - name: MariaDB
    description: MariaDB Operator plugin
  - name: KEDA
    description: KEDA autoscaling plugin
  - name: Ceph
    description: Rook Ceph storage plugin
  - name: Helm
    description: Helm releases management plugin
  - name: AI
    description: AI assistant configuration and management
  - name: AI Conversations
    description: AI chat conversation history
  - name: AI Memories
    description: AI user memories
  - name: AI Agents
    description: AI agents and tasks
  - name: Notifications
    description: Notification system
  - name: Settings
    description: System settings
  - name: Audit
    description: Audit log
  - name: Setup
    description: First-run setup wizard
  - name: WebSocket
    description: Real-time event streaming

paths:
  # ──────────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────────
  /healthz:
    get:
      summary: Health check
      operationId: healthz
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "401":
          description: Invalid refresh token

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user info
      operationId: getCurrentUser
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      operationId: logout
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logged out
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/permissions:
    get:
      tags: [RBAC]
      summary: Get current user permissions
      operationId: getPermissions
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: User permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Permission"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/oidc/authorize:
    get:
      tags: [Auth]
      summary: Initiate OIDC login flow
      operationId: oidcAuthorize
      responses:
        "302":
          description: Redirect to OIDC provider

  /api/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      operationId: oidcCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend with tokens

  /api/auth/oidc/info:
    get:
      tags: [Auth]
      summary: Get OIDC provider info
      operationId: getOidcInfo
      responses:
        "200":
          description: OIDC status
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  authorize_url:
                    type: string

  # ──────────────────────────────────────────────
  # API Keys
  # ──────────────────────────────────────────────
  /api/auth/api-keys:
    get:
      tags: [API Keys]
      summary: List API keys for current user
      operationId: listApiKeys
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"
    post:
      tags: [API Keys]
      summary: Create a new API key
      operationId: createApiKey
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                expires_in_days:
                  type: integer
      responses:
        "201":
          description: API key created (raw key returned only once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreateResponse"

  /api/auth/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      operationId: revokeApiKey
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Key revoked
        "404":
          description: Key not found

  # ──────────────────────────────────────────────
  # Users (admin)
  # ──────────────────────────────────────────────
  /api/users:
    get:
      tags: [Users]
      summary: List all users (admin)
      operationId: listUsers
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Admin role required
    post:
      tags: [Users]
      summary: Create a user (admin)
      operationId: createUser
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, display_name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                display_name:
                  type: string
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: User already exists

  /api/users/{id}:
    delete:
      tags: [Users]
      summary: Delete a user (admin)
      operationId: deleteUser
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User deleted
        "400":
          description: Cannot delete own account
        "404":
          description: User not found

  # ──────────────────────────────────────────────
  # Profile & Preferences
  # ──────────────────────────────────────────────
  /api/users/me:
    patch:
      tags: [Profile]
      summary: Update current user profile
      operationId: updateProfile
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/users/me/password:
    patch:
      tags: [Profile]
      summary: Change password
      operationId: changePassword
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed
        "401":
          description: Current password incorrect

  /api/users/me/preferences:
    get:
      tags: [Profile]
      summary: Get user preferences
      operationId: getPreferences
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      tags: [Profile]
      summary: Save user preferences
      operationId: setPreferences
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferences"
      responses:
        "200":
          description: Saved preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  # ──────────────────────────────────────────────
  # RBAC Roles
  # ──────────────────────────────────────────────
  /api/roles:
    get:
      tags: [RBAC]
      summary: List all roles with permissions
      operationId: listRoles
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      tags: [RBAC]
      summary: Create a custom role
      operationId: createRole
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Role created

  /api/roles/{id}:
    delete:
      tags: [RBAC]
      summary: Delete a custom role
      operationId: deleteRole
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Role deleted
        "400":
          description: Cannot delete built-in role

  /api/roles/{id}/permissions:
    get:
      tags: [RBAC]
      summary: List permissions for a role
      operationId: listRolePermissions
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RolePermission"
    post:
      tags: [RBAC]
      summary: Add permission to a role
      operationId: addRolePermission
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resource, action, scope_type]
              properties:
                resource:
                  type: string
                action:
                  type: string
                scope_type:
                  type: string
                scope_id:
                  type: string
      responses:
        "201":
          description: Permission added

  /api/roles/{id}/permissions/{permId}:
    delete:
      tags: [RBAC]
      summary: Remove permission from a role
      operationId: removeRolePermission
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: permId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Permission removed
        "404":
          description: Permission not found

  /api/roles/assignments:
    get:
      tags: [RBAC]
      summary: List all user-role assignments
      operationId: listAssignments
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Assignment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleAssignment"

  /api/roles/assign:
    post:
      tags: [RBAC]
      summary: Assign a role to a user
      operationId: assignRole
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_email, role_name]
              properties:
                user_email:
                  type: string
                role_name:
                  type: string
                cluster_id:
                  type: string
                  format: uuid
                namespace:
                  type: string
      responses:
        "201":
          description: Role assigned

  /api/roles/revoke/{id}:
    delete:
      tags: [RBAC]
      summary: Revoke a user-role assignment
      operationId: revokeAssignment
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Assignment revoked
        "404":
          description: Assignment not found

  # ──────────────────────────────────────────────
  # Clusters
  # ──────────────────────────────────────────────
  /api/clusters:
    get:
      tags: [Clusters]
      summary: List all clusters
      operationId: listClusters
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Cluster list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cluster"
    post:
      tags: [Clusters]
      summary: Add a new cluster
      operationId: createCluster
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, api_server_url, kubeconfig]
              properties:
                name:
                  type: string
                api_server_url:
                  type: string
                kubeconfig:
                  type: string
      responses:
        "201":
          description: Cluster added

  /api/clusters/{id}:
    get:
      tags: [Clusters]
      summary: Get cluster details
      operationId: getCluster
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Cluster details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cluster"
    put:
      tags: [Clusters]
      summary: Update cluster metadata
      operationId: updateCluster
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                api_server_url:
                  type: string
      responses:
        "200":
          description: Cluster updated
    delete:
      tags: [Clusters]
      summary: Remove a cluster
      operationId: deleteCluster
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "204":
          description: Cluster removed

  /api/clusters/{id}/health:
    post:
      tags: [Clusters]
      summary: Check cluster health
      operationId: healthCheckCluster
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [connected, unreachable]

  # ──────────────────────────────────────────────
  # Agent Tokens
  # ──────────────────────────────────────────────
  /api/clusters/agent-token:
    get:
      tags: [Agent Tokens]
      summary: List agent tokens
      operationId: listAgentTokens
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Token list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentToken"
    post:
      tags: [Agent Tokens]
      summary: Generate a new agent token
      operationId: generateAgentToken
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cluster_name]
              properties:
                cluster_name:
                  type: string
                permissions:
                  type: string
      responses:
        "201":
          description: Token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_id:
                    type: string
                  install_command:
                    type: string
                  token:
                    type: string
                  token_info:
                    $ref: "#/components/schemas/AgentToken"

  /api/clusters/agent-token/{id}:
    get:
      tags: [Agent Tokens]
      summary: Get agent token details
      operationId: getAgentToken
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token details
    delete:
      tags: [Agent Tokens]
      summary: Revoke an agent token
      operationId: revokeAgentToken
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Token revoked

  /api/clusters/agent-token/{id}/install-command:
    get:
      tags: [Agent Tokens]
      summary: Get install command for agent token
      operationId: getInstallCommand
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Install command
        "409":
          description: Token already used

  /api/agents/install.sh:
    get:
      tags: [Agent Tokens]
      summary: Download agent install script
      operationId: getInstallScript
      responses:
        "200":
          description: Shell script
          content:
            text/x-shellscript:
              schema:
                type: string

  # ──────────────────────────────────────────────
  # Convenience endpoints (namespaces, nodes, events, api-resources)
  # ──────────────────────────────────────────────
  /api/clusters/{clusterID}/namespaces:
    get:
      tags: [Resources]
      summary: List namespaces
      operationId: listNamespaces
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
      responses:
        "200":
          description: Namespace list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string

  /api/clusters/{clusterID}/nodes:
    get:
      tags: [Resources]
      summary: List nodes
      operationId: listNodes
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
      responses:
        "200":
          description: Node list

  /api/clusters/{clusterID}/events:
    get:
      tags: [Resources]
      summary: List events
      operationId: listEvents
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
        - name: namespace
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Event list

  /api/clusters/{clusterID}/api-resources:
    get:
      tags: [Resources]
      summary: List available API resources
      operationId: listApiResources
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
      responses:
        "200":
          description: API resource list

  # ──────────────────────────────────────────────
  # Generic K8s Resources
  # ──────────────────────────────────────────────
  /api/clusters/{clusterID}/resources/{group}/{version}/{resource}:
    get:
      tags: [Resources]
      summary: List Kubernetes resources
      operationId: listResources
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
        - $ref: "#/components/parameters/K8sGroup"
        - $ref: "#/components/parameters/K8sVersion"
        - $ref: "#/components/parameters/K8sResource"
        - name: namespace
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resource list
    post:
      tags: [Resources]
      summary: Create a Kubernetes resource
      operationId: createResource
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
        - $ref: "#/components/parameters/K8sGroup"
        - $ref: "#/components/parameters/K8sVersion"
        - $ref: "#/components/parameters/K8sResource"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Resource created

  /api/clusters/{clusterID}/resources/{group}/{version}/{resource}/{name}:
    get:
      tags: [Resources]
      summary: Get a specific Kubernetes resource
      operationId: getResource
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
        - $ref: "#/components/parameters/K8sGroup"
        - $ref: "#/components/parameters/K8sVersion"
        - $ref: "#/components/parameters/K8sResource"
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: namespace
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resource details
    put:
      tags: [Resources]
      summary: Update a Kubernetes resource
      operationId: updateResource
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
        - $ref: "#/components/parameters/K8sGroup"
        - $ref: "#/components/parameters/K8sVersion"
        - $ref: "#/components/parameters/K8sResource"
