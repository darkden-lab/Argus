  # ──────────────────────────────────────────────
  # Network Policy Simulator
  # ──────────────────────────────────────────────
  /api/clusters/{clusterID}/network-policies/simulate:
    get:
      tags: [Resources]
      summary: Simulate network policy connectivity
      operationId: simulateNetworkPolicy
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
        - name: sourceNamespace
          in: query
          required: true
          schema:
            type: string
        - name: sourcePod
          in: query
          required: true
          schema:
            type: string
        - name: destNamespace
          in: query
          required: true
          schema:
            type: string
        - name: destPod
          in: query
          required: true
          schema:
            type: string
        - name: port
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed:
                    type: boolean
                  reason:
                    type: string
                  matchedPolicies:
                    type: array
                    items:
                      type: string

  # ──────────────────────────────────────────────
  # Pod Logs
  # ──────────────────────────────────────────────
  /api/clusters/{clusterID}/namespaces/{namespace}/pods/{pod}/logs:
    get:
      tags: [Resources]
      summary: Get or stream pod logs
      operationId: getPodLogs
      description: Supports SSE streaming with follow=true. Auth via token query param or Authorization header.
      parameters:
        - $ref: "#/components/parameters/ClusterIdPath"
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: pod
          in: path
          required: true
          schema:
            type: string
        - name: container
          in: query
          schema:
            type: string
        - name: tailLines
          in: query
          schema:
            type: integer
            default: 100
        - name: previous
          in: query
          schema:
            type: boolean
        - name: follow
          in: query
          schema:
            type: boolean
        - name: token
          in: query
          schema:
            type: string
          description: JWT token (alternative to Authorization header, for EventSource)
      responses:
        "200":
          description: Log output (JSON or SSE stream)

