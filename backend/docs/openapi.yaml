# ==============================================
# Components
# ==============================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    ClusterId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClusterIdPath:
      name: clusterID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClusterVar:
      name: cluster
      in: path
      required: true
      schema:
        type: string
    ProjectName:
      name: project
      in: path
      required: true
      schema:
        type: string
    ResourceName:
      name: name
      in: path
      required: true
      schema:
        type: string
    NamespacePath:
      name: namespace
      in: path
      required: true
      schema:
        type: string
    K8sGroup:
      name: group
      in: path
      required: true
      schema:
        type: string
      description: API group ("_" for core group)
    K8sVersion:
      name: version
      in: path
      required: true
      schema:
        type: string
    K8sResource:
      name: resource
      in: path
      required: true
      schema:
        type: string
    PluginClusterQuery:
      name: cluster
      in: query
      schema:
        type: string
    PluginNamespaceQuery:
      name: namespace
      in: query
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        auth_provider:
          type: string
          enum: [local, oidc]
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        access_token:
          type: string
        refresh_token:
          type: string

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [dark, light, system]
        language:
          type: string
        sidebar_compact:
          type: boolean
        animations_enabled:
          type: boolean

    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time

    APIKeyCreateResponse:
